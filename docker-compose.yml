services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-top_reports}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-top_reports}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8000}
      JWT_SECRET: ${JWT_SECRET:-top_reports_dev_secret}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-quartr}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_DIR: ${LOCAL_STORAGE_DIR:-storage/files}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      REPORT_PREFETCH_ENABLED: ${REPORT_PREFETCH_ENABLED:-false}
      REPORT_PREFETCH_INTERVAL_SECONDS: ${REPORT_PREFETCH_INTERVAL_SECONDS:-86400}
      REPORT_PREFETCH_USER_EMAIL: ${REPORT_PREFETCH_USER_EMAIL:-seeded-user@quartr.dev}
      DATABASE_URL:
        ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/top_reports}
    command: >
      sh -c "python -m db.seed &&
      exec python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - report_storage:/app/storage/files

volumes:
  postgres_data:
  report_storage:
